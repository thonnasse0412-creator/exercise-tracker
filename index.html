<!DOCTYPE html>
<html>
<head>
  <title>Exercise Tracker</title>
</head>
<body>

<h1>Exercise Tracker</h1>
<p>เป้าหมาย: <input id="goal" type="number" value="15"></p>

<div id="days"></div>

<h2>ความคืบหน้า</h2>
<p id="progress">0 / 15</p>

<script>
const daysContainer = document.getElementById("days");

for (let i = 1; i <= 31; i++) {
  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.onchange = updateProgress;

  const label = document.createElement("label");
  label.textContent = " Day " + i;

  daysContainer.appendChild(label);
  daysContainer.appendChild(checkbox);
  daysContainer.appendChild(document.createElement("br"));
}

function updateProgress() {
  const checked = document.querySelectorAll("input[type=checkbox]:checked").length;
  const goal = document.getElementById("goal").value;
  document.getElementById("progress").textContent = checked + " / " + goal;
}
</script>

</body>
</html>
